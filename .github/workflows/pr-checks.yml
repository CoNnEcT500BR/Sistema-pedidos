name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run -w apps/server db:generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  smoke-e2e:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run -w apps/server db:generate

      - name: Prepare database
        run: |
          npm run -w apps/server db:push
          npm run -w apps/server db:seed

      - name: Run smoke E2E
        shell: bash
        run: |
          set -euo pipefail

          npm run -w apps/server dev > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            kill $SERVER_PID || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://localhost:3001/health > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://localhost:3001/health > /dev/null

          E2E_API_BASE=http://localhost:3001 npm run test:e2e:all
