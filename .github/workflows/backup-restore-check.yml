name: Backup Restore Check

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  backup-restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: |
          npm run -w apps/server db:push
          npm run -w apps/server db:seed

      - name: Backup database
        run: npm run ops:db:backup

      - name: Restore and validate
        run: npm run ops:db:restore:validate

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-artifacts
          path: |
            apps/server/prisma/backups/*.db
            apps/server/prisma/restore-check.db
